<h2>Register</h2>

<input type="text" placeholder="Name" [(ngModel)]="user.name"><br><br>
<input type="email" placeholder="Email" [(ngModel)]="user.email"><br><br>
<input type="password" placeholder="Password" [(ngModel)]="user.password"><br><br>

<button (click)="register()">Register</button>

<br><br>
<a routerLink="/login">Go to Login</a>
